<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="TC Books — a tik-choco double-entry bookkeeping app that also works as a household account book, with LLM receipt OCR." />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d0e12" media="(prefers-color-scheme: dark)" />
    <title>TC Books</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Apply the saved theme before first paint to avoid a flash of the wrong
         theme (FOUC). Mirrors useTheme(): the choice is stored as a raw
         "light"/"dark" string under tc-books:theme; default is light. -->
    <script>
      (function () {
        try {
          if (localStorage.getItem('tc-books:theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
